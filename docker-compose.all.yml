# 두 프로젝트 한 번에 띄우기 (나란히 동시 실행).
#   docker compose -f docker-compose.all.yml up --build
#
# - include: 기존 PayWise 프로젝트의 compose 를 그대로 끌어옴 (원본 수정 안 함)
#   → postgres/redis/kafka/fraud-service(8010)/backend(8020)/frontend(3020)
# - 여기에 후속 보안 데모(security-demo, 8030) 를 한 서비스로 추가
#
# 포트 정리:  3020 PayWise 프론트 · 8020 PayWise 백엔드 · 8010 fraud-service
#            8030 보안 데모(이 프로젝트)
# 두 프로젝트는 서로 호출하지 않고 각자 자기 DB 로 독립 동작(데이터 분리).
name: capstone-all

include:
  - path: ../캡스톤_프로젝트/docker-compose.yml

services:
  security-demo:
    build: .
    ports:
      - "8030:8030"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
